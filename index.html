<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>동작구 DRT 앱 다운로드</title>
    
    <style>
        /* 로딩 중 코드가 보이는 것을 방지 */
        html { visibility: hidden; background-color: #ffffff; }
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #ffffff; overflow: hidden; visibility: visible;
        }
        .bus-image { width: 100%; height: 100%; object-fit: contain; }
    </style>

    <script>
        (function() {
            var iosUrl = "https://apps.apple.com/app/id6758448550";
            var androidUrl = "https://play.google.com/store/apps/details?id=com.mobble.mod.dongjak";
            var errorFallbackUrl = "https://user-goji.vercel.app/";
            
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var targetUrl = errorFallbackUrl; // 기본값을 에러 페이지로 설정

            // 1. 기기 판별
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                targetUrl = iosUrl;
            } else if (/android/i.test(userAgent)) {
                targetUrl = androidUrl;
            }

            // 2. 즉시 이동 시도
            window.location.replace(targetUrl);

            // 3. [에러 방지 보험] 3초 후에도 페이지가 머물러 있다면Fallback 페이지로 강제 이동
            setTimeout(function() {
                if (!document.hidden) {
                    window.location.href = errorFallbackUrl;
                }
            }, 3000);
        })();
    </script>
</head>
<body>
    <img src="image_3.png" class="bus-image" alt="동작 CALL 버스">
</body>
</html>
