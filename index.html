<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동작구 DRT 앱 다운로드</title>
    <style>
        /* 화면의 여백을 모두 없애고 이미지가 꽉 차게 설정합니다 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 스크롤바가 생기지 않게 합니다 */
            background-color: #f0f0f0; /* 이미지 로딩 전 배경색 */
        }
        /* 이미지가 화면 비율을 유지하며 가득 차도록 설정합니다 */
        #drt-image {
            width: 100%;
            height: 100vh; /* 화면 높이의 100% */
            object-fit: contain; /* 이미지가 잘리지 않고 전체가 다 보이게 설정 (꽉 채우려면 'cover') */
            object-position: center; /* 중앙 정렬 */
            display: block; /* 하단 여백 제거 */
        }
        /* 혹시 모를 클릭에 대비해 커서를 손가락 모양으로 변경 */
        .image-link {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
    <script>
        (function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var androidUrl = "https://play.google.com/store/apps/details?id=com.mobble.mod.dongjak";
            var iosUrl = "https://apps.apple.com/app/id6754006150";
            var targetUrl = androidUrl; // 기본값은 안드로이드

            // iOS(아이폰, 아이패드) 판별
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                targetUrl = iosUrl;
            }

            // 1. 페이지 로드 즉시 스토어로 이동 시작
            window.location.replace(targetUrl);

            // 2. (보조 수단) 이미지 클릭 시에도 이동하도록 링크 설정
            window.onload = function() {
                var linkElement = document.getElementById('store-link');
                if (linkElement) {
                    linkElement.href = targetUrl;
                }
            };
        })();
    </script>
</head>
<body>
    <a id="store-link" href="https://play.google.com/store/apps/details?id=com.mobble.mod.dongjak" class="image-link">
        <img id="drt-image" src="image_3.png" alt="동작 CALL 버스 DRT">
    </a>
</body>
</html>
