승훈 팀장님, 요청하신 대로 안드로이드 및 기타 접속 시의 기본 연결 페이지를 **https://user-goji.vercel.app/**로 변경하고, '코드 깜빡임' 현상을 방지하는 최적화 코드를 다시 구성했습니다.

아이폰 사용자는 기존처럼 앱스토어로 연결되고, 그 외의 모든 접속(안드로이드, PC 등)은 말씀하신 새 링크로 이동하게 됩니다.

🛠️ 최종 수정 코드 (index.html)
아래 코드를 복사하여 깃허브의 index.html 내용을 전체 교체해 주세요.

HTML
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>동작구 DRT 앱 다운로드</title>
    
    <style>
        /* 페이지 로드 전 코드가 노출되지 않도록 화면을 숨깁니다 */
        html { 
            visibility: hidden; 
            background-color: #ffffff; 
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            overflow: hidden;
            visibility: visible; /* 이미지만 보이도록 설정 */
        }

        .bus-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 동작 CALL 버스 이미지 비율 유지 */
        }
    </style>

    <script>
        (function() {
            // 연결 주소 설정
            var iosUrl = "https://apps.apple.com/app/id6754006150";
            var defaultUrl = "https://user-goji.vercel.app/"; // 안드로이드 및 기본 연결 주소
            
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var targetUrl = defaultUrl;

            // iOS(아이폰, 아이패드)인 경우에만 앱스토어로 연결
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                targetUrl = iosUrl;
            }

            // 즉시 리디렉션 실행 (코드가 보일 틈을 주지 않음)
            window.location.replace(targetUrl);
        })();
    </script>
</head>
<body>
    <img src="image_3.png" class="bus-image" alt="동작 CALL 버스">
</body>
</html>
